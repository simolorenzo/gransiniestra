<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorem Ipsum | Dolor Sit</title>
  <link rel="stylesheet" href="./assets/styles/main.css" />
</head>
<body>
  <main id="guideApp" class="guide-shell loading">
    <aside class="guide-sidebar">
      <div class="guide-sidebar-inner">
        <div class="guide-sidebar-top">
          <a class="guide-brand" href="./index.html">
            <span class="guide-brand-mark">GS</span>
            <span>Lorem Ipsum</span>
          </a>
          <a class="guide-mini-link" href="./guias.html">Lorem dolor</a>
        </div>
        <div id="guideSidebarNav" class="guide-sidebar-nav"></div>
      </div>
    </aside>

    <section class="guide-stage">
      <header class="guide-stage-head">
        <a class="guide-back-link" href="./guias.html">Lorem ipsum</a>
        <nav class="guide-stage-links">
          <a href="./mapa.html">Ipsum</a>
          <a href="./index.html">Dolor</a>
        </nav>
      </header>

      <div class="guide-stage-body">
        <div id="article"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/app.js"></script>
  <script>
    function slugifyFragment(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function buildSidebar(groups, currentSlug) {
      return groups.map((group) => `
        <section class="guide-nav-group">
          <h2>${escapeHtml(group.category)}</h2>
          <ul>
            ${group.items.map((item) => `
              <li>
                <a class="${item.slug === currentSlug ? 'is-active' : ''}" href="./guia.html?slug=${encodeURIComponent(item.slug)}">
                  ${escapeHtml(item.title)}
                </a>
              </li>
            `).join('')}
          </ul>
        </section>
      `).join('');
    }

    function buildGuideMarkup(guide, markdown) {
      const html = marked.parse(markdown);
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;

      const sectionLinks = [];
      const headings = wrapper.querySelectorAll('h2');

      headings.forEach((heading, index) => {
        const id = slugifyFragment(heading.textContent) || `seccion-${index + 1}`;
        heading.id = id;
        sectionLinks.push({
          id,
          label: heading.textContent.trim()
        });
      });

      return `
        <article class="guide-paper">
          <header class="guide-paper-head">
            <div class="guide-kicker">${escapeHtml(guide?.category || 'Lorem')}</div>
            <h1>${escapeHtml(guide?.title || 'Lorem ipsum')}</h1>
            ${guide?.description ? `<p>${escapeHtml(guide.description)}</p>` : ''}
          </header>
          <div class="guide-section-tabs">
            ${sectionLinks.length ? sectionLinks.map((section) => `
              <a href="#${escapeHtml(section.id)}">${escapeHtml(section.label)}</a>
            `).join('') : '<span>Lorem ipsum</span>'}
          </div>
          <div class="guide-paper-divider"></div>
          <div class="guide-body markdown-body">${wrapper.innerHTML}</div>
        </article>
      `;
    }

    async function init() {
      const slug = getParam('slug');
      const article = document.getElementById('article');
      const sidebarNav = document.getElementById('guideSidebarNav');
      const guideApp = document.getElementById('guideApp');

      if (!slug) {
        article.innerHTML = `
          <article class="guide-paper">
            <header class="guide-paper-head">
              <div class="guide-kicker">Lorem ipsum</div>
              <h1>Lorem ipsum dolor sit</h1>
              <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </header>
          </article>
        `;
        return;
      }

      const guides = await fetchCsv('./data/guias.csv');
      const groupedGuides = groupBy(guides, (item) => item.category || 'Lorem');
      sidebarNav.innerHTML = buildSidebar(groupedGuides, slug);

      const guide = guides.find((item) => item.slug === slug);
      const markdown = await fetchText(`./content/guias/${slug}.md`);

      article.innerHTML = buildGuideMarkup(guide, markdown);
      document.title = `${guide?.title || slugToTitle(slug)} | Lorem Ipsum`;
      guideApp.classList.remove('loading');
    }

    init().catch((error) => {
      console.error(error);
      document.getElementById('article').innerHTML = `
        <article class="guide-paper">
          <header class="guide-paper-head">
            <div class="guide-kicker">Lorem ipsum</div>
            <h1>Lorem ipsum dolor sit</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </header>
        </article>
      `;
    });
  </script>
</body>
</html>
