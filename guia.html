<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrada | Gran Siniestra</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a class="brand" href="./index.html">
        <span class="brand-mark">GS</span>
        <span>Gran Siniestra</span>
      </a>
      <nav class="nav">
        <a href="./guias.html">Archivo</a>
        <a href="./mapa.html">Mapa</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <a class="back-link" href="./guias.html">Volver al archivo</a>
    <div id="article" class="split-layout"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/app.js"></script>
  <script>
    async function init() {
      const slug = getParam('slug');
      const article = document.getElementById('article');

      if (!slug) {
        article.innerHTML = `
          <article class="article">
            <div class="article-head">
              <div class="section-tag">Entrada</div>
              <h1>Falta la referencia</h1>
              <p class="muted">Abre la guia desde el archivo o desde un marcador del mapa.</p>
            </div>
          </article>
        `;
        return;
      }

      const guides = await fetchCsv('./data/guias.csv');
      const guide = guides.find((item) => item.slug === slug);
      const markdown = await fetchText(`./content/guias/${slug}.md`);

      article.innerHTML = `
        <article class="article">
          <div class="article-head">
            <div class="section-tag">Entrada del atlas</div>
            <h1>${escapeHtml(guide?.title || slugToTitle(slug))}</h1>
            ${guide?.description ? `<p class="muted">${escapeHtml(guide.description)}</p>` : ''}
            <div class="article-divider"></div>
          </div>
          <div class="markdown-body">${marked.parse(markdown)}</div>
        </article>
        <aside class="detail-panel">
          <dl>
            <div>
              <dt>Categoria</dt>
              <dd>${escapeHtml(guide?.category || 'Sin categoria')}</dd>
            </div>
            <div>
              <dt>Slug</dt>
              <dd><code>${escapeHtml(slug)}</code></dd>
            </div>
            <div>
              <dt>Uso</dt>
              <dd>La entrada puede consultarse sola o desde el mapa, segun como prefieras dirigir la sesion.</dd>
            </div>
          </dl>
        </aside>
      `;
    }

    init().catch((error) => {
      console.error(error);
      document.getElementById('article').innerHTML = `
        <article class="article">
          <div class="article-head">
            <div class="section-tag">Error</div>
            <h1>No se pudo abrir esta entrada</h1>
            <p class="muted">Revisa que el slug exista en el CSV y que el archivo Markdown este disponible.</p>
          </div>
        </article>
      `;
    });
  </script>
</body>
</html>
