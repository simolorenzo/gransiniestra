<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guía</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a class="brand" href="./index.html">Atlas del rol</a>
      <nav class="nav">
        <a href="./guias.html">Guías</a>
        <a href="./mapa.html">Mapa</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <a class="back-link" href="./guias.html">← Volver al índice de guías</a>
    <article id="article" class="article">Cargando guía…</article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/app.js"></script>
  <script>
    async function init() {
      const slug = getParam('slug');
      const article = document.getElementById('article');

      if (!slug) {
        article.innerHTML = '<h1>Falta el slug</h1><p class="muted">Abre la guía desde el índice.</p>';
        return;
      }

      const guides = await fetchCsv('./data/guias.csv');
      const guide = guides.find(item => item.slug === slug);
      const markdown = await fetchText(`./content/guias/${slug}.md`);

      article.innerHTML = `
        <h1>${escapeHtml(guide?.title || slugToTitle(slug))}</h1>
        ${guide?.category ? `<p class="muted">${escapeHtml(guide.category)}</p>` : ''}
        ${guide?.description ? `<p>${escapeHtml(guide.description)}</p>` : ''}
        <hr style="border:0;border-top:1px solid var(--border);margin:20px 0;" />
        <div class="markdown-body">${marked.parse(markdown)}</div>
      `;
    }

    init().catch(error => {
      console.error(error);
      document.getElementById('article').innerHTML = '<h1>Error</h1><p>No se pudo cargar esta guía.</p>';
    });
  </script>
</body>
</html>
