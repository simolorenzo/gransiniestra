<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorem Ipsum | Dolor Sit</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="guide-shell guide-shell-index">
    <aside class="guide-sidebar">
      <div class="guide-sidebar-inner">
        <div class="guide-sidebar-top">
          <a class="guide-brand" href="./index.html">
            <span class="guide-brand-mark">GS</span>
            <span>Lorem Ipsum</span>
          </a>
          <a class="guide-mini-link" href="./mapa.html">Dolor sit</a>
        </div>
        <div id="guideIndexNav" class="guide-sidebar-nav"></div>
      </div>
    </aside>

    <section class="guide-stage">
      <header class="guide-stage-head">
        <a class="guide-back-link" href="./index.html">Lorem ipsum</a>
        <nav class="guide-stage-links">
          <a href="./mapa.html">Ipsum</a>
          <a href="./index.html">Dolor</a>
        </nav>
      </header>

      <div class="guide-stage-body">
        <section class="guide-paper guide-index-paper">
          <header class="guide-paper-head">
            <div class="guide-kicker">Lorem ipsum</div>
            <h1>Lorem ipsum dolor sit amet</h1>
            <p>
              Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor
              incididunt ut labore et dolore magna aliqua.
            </p>
          </header>

          <div class="guide-toolbar">
            <div class="field">
              <input
                id="searchInput"
                class="input"
                type="search"
                placeholder="Lorem ipsum dolor sit"
              />
            </div>
            <div id="resultsMeta" class="guide-results-meta">Lorem ipsum</div>
          </div>

          <section id="guideList" class="guide-index-list"></section>
        </section>
      </div>
    </section>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    function buildIndexSidebar(groups) {
      return groups.map((group) => `
        <section class="guide-nav-group">
          <h2>${escapeHtml(group.category)}</h2>
          <ul>
            ${group.items.map((item) => `
              <li>
                <a href="./guia.html?slug=${encodeURIComponent(item.slug)}">${escapeHtml(item.title)}</a>
              </li>
            `).join('')}
          </ul>
        </section>
      `).join('');
    }

    async function init() {
      const guides = await fetchCsv('./data/guias.csv');
      const list = document.getElementById('guideList');
      const searchInput = document.getElementById('searchInput');
      const resultsMeta = document.getElementById('resultsMeta');
      const guideIndexNav = document.getElementById('guideIndexNav');
      const groupedGuides = groupBy(guides, (item) => item.category || 'Lorem');

      guideIndexNav.innerHTML = buildIndexSidebar(groupedGuides);

      function render() {
        const query = searchInput.value.trim().toLowerCase();
        const filtered = guides.filter((guide) => {
          const haystack = `${guide.title} ${guide.category} ${guide.description}`.toLowerCase();
          return haystack.includes(query);
        });

        resultsMeta.textContent = `${filtered.length} lorem`;

        if (!filtered.length) {
          list.innerHTML = '<div class="empty-state">Lorem ipsum dolor sit amet.</div>';
          return;
        }

        list.innerHTML = filtered.map((guide) => `
          <a class="guide-index-row" href="./guia.html?slug=${encodeURIComponent(guide.slug)}">
            <span>${escapeHtml(guide.category || 'Lorem')}</span>
            <strong>${escapeHtml(guide.title)}</strong>
            <p>${escapeHtml(guide.description || 'Lorem ipsum dolor sit amet.')}</p>
          </a>
        `).join('');
      }

      searchInput.addEventListener('input', render);
      render();
    }

    init().catch((error) => {
      console.error(error);
      document.getElementById('guideList').innerHTML = '<div class="empty-state">Lorem ipsum dolor sit amet.</div>';
      document.getElementById('resultsMeta').textContent = 'Dolor';
    });
  </script>
</body>
</html>
