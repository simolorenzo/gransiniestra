<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archivo | Gran Siniestra</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a class="brand" href="./index.html">
        <span class="brand-mark">GS</span>
        <span>Gran Siniestra</span>
      </a>
      <nav class="nav">
        <a href="./index.html">Portada</a>
        <a href="./mapa.html">Mapa</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <div class="section-head">
      <div>
        <div class="section-tag">Archivo</div>
        <h1>Guias de la campaña</h1>
      </div>
      <p class="muted">
        Entradas breves, listas para consultar en mesa. El listado se genera desde
        <code>data/guias.csv</code> y filtra por titulo, categoria o descripcion.
      </p>
    </div>

    <div class="toolbar">
      <div class="field">
        <input
          id="searchInput"
          class="input"
          type="search"
          placeholder="Buscar una ciudad, una faccion o un rumor"
        />
      </div>
      <div id="resultsMeta" class="toolbar-note chip">Cargando archivo</div>
    </div>

    <section id="guideList" class="list-grid"></section>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    async function init() {
      const guides = await fetchCsv('./data/guias.csv');
      const list = document.getElementById('guideList');
      const searchInput = document.getElementById('searchInput');
      const resultsMeta = document.getElementById('resultsMeta');

      function render() {
        const query = searchInput.value.trim().toLowerCase();
        const filtered = guides.filter((guide) => {
          const haystack = `${guide.title} ${guide.category} ${guide.description}`.toLowerCase();
          return haystack.includes(query);
        });

        resultsMeta.textContent = `${filtered.length} entrada${filtered.length === 1 ? '' : 's'}`;

        if (!filtered.length) {
          list.innerHTML = '<div class="empty-state">No hay coincidencias con ese termino.</div>';
          return;
        }

        list.innerHTML = filtered.map((guide) => `
          <a class="guide-card" href="./guia.html?slug=${encodeURIComponent(guide.slug)}">
            <span class="chip">${escapeHtml(guide.category || 'Sin categoria')}</span>
            <strong>${escapeHtml(guide.title)}</strong>
            <p class="muted">${escapeHtml(guide.description || 'Sin descripcion breve.')}</p>
          </a>
        `).join('');
      }

      searchInput.addEventListener('input', render);
      render();
    }

    init().catch((error) => {
      console.error(error);
      document.getElementById('guideList').innerHTML = '<div class="empty-state">No se pudo cargar el archivo.</div>';
      document.getElementById('resultsMeta').textContent = 'Error';
    });
  </script>
</body>
</html>
