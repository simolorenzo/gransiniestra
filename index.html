<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa y guías</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c23;
      --text: #e9edf3;
      --muted: #aab4c3;
      --accent: #d0a85c;
      --border: #2a313d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 24px;
    }

    .sidebar h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    .sidebar p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .guide-list {
      display: grid;
      gap: 12px;
    }

    .guide-card {
      display: block;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #12161d;
      color: inherit;
      text-decoration: none;
    }

    .guide-card:hover {
      border-color: var(--accent);
    }

    .guide-card strong {
      display: block;
      margin-bottom: 6px;
    }

    .guide-card span {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .stage {
      padding: 24px;
      overflow: auto;
    }

    .map-wrap {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: #0b0d11;
    }

    .map-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      width: 18px;
      height: 18px;
      border: 2px solid #111;
      border-radius: 999px;
      background: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }

    .marker::after {
      content: "";
      position: absolute;
      inset: -6px;
      border: 1px solid rgba(208,168,92,.35);
      border-radius: 999px;
    }

    .tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      min-width: 180px;
      max-width: 240px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(18,22,29,.96);
      border: 1px solid var(--border);
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }

    .marker:hover .tooltip,
    .marker:focus .tooltip {
      opacity: 1;
    }

    .tooltip strong {
      display: block;
      margin-bottom: 4px;
      font-size: .95rem;
    }

    .tooltip span {
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</head>
<body>
  <main class="layout">
    <aside class="sidebar">
      <h1>Mapa del mundo</h1>
      <p>
        Los puntos salen de <code>data/mapa.json</code>.
        Las guías cargan desde <code>content/guias/*.md</code>.
      </p>
      <div id="guideList" class="guide-list"></div>
    </aside>

    <section class="stage">
      <div id="mapWrap" class="map-wrap"></div>
    </section>
  </main>

  <script>
    async function init() {
      const res = await fetch('./data/mapa.json');
      const data = await res.json();

      const mapWrap = document.getElementById('mapWrap');
      const guideList = document.getElementById('guideList');

      const img = document.createElement('img');
      img.src = data.image;
      img.alt = data.title || 'Mapa';
      mapWrap.appendChild(img);

      data.locations.forEach((location) => {
        const marker = document.createElement('a');
        marker.className = 'marker';
        marker.href = `./guia.html?slug=${encodeURIComponent(location.guideSlug)}`;
        marker.style.left = `${location.x}%`;
        marker.style.top = `${location.y}%`;
        marker.setAttribute('aria-label', location.name);

        const tooltip = document.createElement('div');
        tooltip.className = 'tooltip';
        tooltip.innerHTML = `
          <strong>${location.name}</strong>
          <span>${location.excerpt || ''}</span>
        `;

        marker.appendChild(tooltip);
        mapWrap.appendChild(marker);

        const card = document.createElement('a');
        card.className = 'guide-card';
        card.href = `./guia.html?slug=${encodeURIComponent(location.guideSlug)}`;
        card.innerHTML = `
          <strong>${location.name}</strong>
          <span>${location.excerpt || ''}</span>
        `;
        guideList.appendChild(card);
      });
    }

    init().catch((error) => {
      console.error(error);
      document.getElementById('mapWrap').innerHTML =
        '<p style="padding:24px">No se pudo cargar el mapa.</p>';
    });
  </script>
</body>
</html>
