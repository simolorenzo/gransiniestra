<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorem Ipsum | Dolor Sit</title>
  <link rel="stylesheet" href="./assets/styles/main.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a class="brand" href="./index.html">
        <span class="brand-mark">GS</span>
        <span>Lorem Ipsum</span>
      </a>
      <nav class="nav">
        <a href="./index.html">Lorem</a>
        <a href="./guias.html">Ipsum</a>
        <a href="./utilidades/coordenadas.html">Dolor</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <div class="section-head">
      <div>
        <div class="section-tag">Lorem ipsum</div>
        <h1>Lorem ipsum dolor sit amet</h1>
      </div>
      <p class="muted">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit in <code>data/mapa.csv</code>.
      </p>
    </div>

    <div class="map-shell">
      <div class="map-head">
        <strong>Lorem ipsum dolor</strong>
        <div class="legend">
          <span>Lorem ipsum dolor</span>
          <span>Sit amet consectetur</span>
        </div>
      </div>
      <div id="mapWrap" class="map-wrap"></div>
    </div>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    async function init() {
      const points = await fetchCsv('./data/mapa.csv');
      const mapWrap = document.getElementById('mapWrap');

      const img = document.createElement('img');
      img.src = 'https://i.imgur.com/Mr40FCw.jpeg';
      img.alt = 'Lorem ipsum dolor sit amet';
      mapWrap.appendChild(img);

      points.forEach((point) => {
        const marker = document.createElement('a');
        marker.className = 'marker';
        marker.href = `./guia.html?slug=${encodeURIComponent(point.slug)}`;
        marker.style.left = `${numberOrZero(point.x)}%`;
        marker.style.top = `${numberOrZero(point.y)}%`;
        marker.setAttribute('aria-label', point.name || point.slug);

        const tooltip = document.createElement('div');
        tooltip.className = 'tooltip';
        tooltip.innerHTML = `
          <strong>${escapeHtml(point.name || point.slug)}</strong>
          <span>${escapeHtml(point.excerpt || '')}</span>
        `;

        marker.appendChild(tooltip);
        mapWrap.appendChild(marker);
      });
    }

    init().catch((error) => {
      console.error(error);
      document.getElementById('mapWrap').innerHTML = '<p style="padding:20px">Lorem ipsum dolor sit amet.</p>';
    });
  </script>
</body>
</html>
