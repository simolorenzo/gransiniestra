<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorem Ipsum | Dolor Sit</title>
  <link rel="stylesheet" href="../assets/styles/main.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a class="brand" href="../index.html">
        <span class="brand-mark">GS</span>
        <span>Lorem Ipsum</span>
      </a>
      <nav class="nav">
        <a href="../mapa.html">Lorem</a>
        <a href="../guias.html">Ipsum</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <div class="section-head">
      <div>
        <div class="section-tag">Lorem ipsum</div>
        <h1>Lorem ipsum dolor sit amet</h1>
      </div>
      <p class="muted">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit in <code>data/mapa.csv</code>.
      </p>
    </div>

    <div class="helper-grid">
      <section class="panel">
        <div class="click-map">
          <img id="mapImage" src="https://i.imgur.com/Mr40FCw.jpeg" alt="Lorem ipsum dolor sit amet" />
          <div id="crosshair" class="crosshair" hidden></div>
        </div>
      </section>

      <aside class="panel table-like">
        <div class="table-row"><strong>X</strong><div id="xValue">-</div></div>
        <div class="table-row"><strong>Y</strong><div id="yValue">-</div></div>
        <div class="table-row">
          <strong>Lorem ipsum</strong>
          <textarea id="csvExample" rows="5" readonly></textarea>
        </div>
        <button id="copyButton" type="button">Lorem ipsum</button>
      </aside>
    </div>
  </main>

  <script>
    const mapImage = document.getElementById('mapImage');
    const crosshair = document.getElementById('crosshair');
    const xValue = document.getElementById('xValue');
    const yValue = document.getElementById('yValue');
    const csvExample = document.getElementById('csvExample');
    const copyButton = document.getElementById('copyButton');

    mapImage.addEventListener('click', (event) => {
      const rect = mapImage.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 100;
      const y = ((event.clientY - rect.top) / rect.height) * 100;
      const xf = x.toFixed(1);
      const yf = y.toFixed(1);

      xValue.textContent = xf;
      yValue.textContent = yf;
      csvExample.value = `lorem-ipsum,Lorem ipsum,dolor,${xf},${yf},Lorem ipsum dolor,lorem-ipsum`;

      crosshair.hidden = false;
      crosshair.style.left = `${event.clientX - rect.left}px`;
      crosshair.style.top = `${event.clientY - rect.top}px`;
    });

    copyButton.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(csvExample.value);
        copyButton.textContent = 'Dolor';
        setTimeout(() => {
          copyButton.textContent = 'Lorem ipsum';
        }, 1200);
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
